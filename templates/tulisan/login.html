<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Sosial Literasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #002d57; height: 100vh; display: flex; align-items: center; }
        .login-card { background: white; border-radius: 0; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-top: 5px solid #e31e24; }
        .btn-login { background: #002d57; color: white; border-radius: 0; font-weight: 700; width: 100%; padding: 12px; }
        .btn-login:hover { background: #001c36; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="login-card">
                    <h3 class="text-center mb-4" style="color: #002d57; font-weight: 800;">SOSIAL LITERASI</h3>
                    <p class="text-center text-muted small mb-4">Masuk untuk mengelola naskah jurnal</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-login">MASUK KE DASHBOARD</button>
                    </form>
                    
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger mt-3 small">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>

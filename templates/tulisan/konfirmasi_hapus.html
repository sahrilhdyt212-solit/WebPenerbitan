<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Konfirmasi Hapus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card mx-auto" style="max-width: 500px;">
            <div class="card-body text-center">
                <h4 class="card-title mb-4">Hapus Naskah?</h4>
                <p>Apakah anda yakin ingin menghapus draf berjudul: <br><strong>"{{ karya.judul }}"</strong>?</p>
                <p class="text-danger small">Tindakan ini tidak bisa dibatalkan.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">Ya, Hapus Permanen</button>
                        <a href="{% url 'daftar_draft' %}" class="btn btn-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
